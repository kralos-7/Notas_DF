<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Validación HTML5</title>
</head>
<body>

<main>
  <section>
    <h1>Registro</h1>

    <form>

      <label for="nombre">Nombre:</label><br>
      <input type="text" id="nombre" name="nombre" required minlength="3"><br><br>

      <label for="email">Correo:</label><br>
      <input type="email" id="email" name="email" required><br><br>

      <label for="edad">Edad:</label><br>
      <input type="number" id="edad" name="edad" min="18" max="60" required><br><br>

      <label for="usuario">Usuario (solo letras):</label><br>
      <input type="text" id="usuario" name="usuario" pattern="[A-Za-z]+" required><br><br>

      <button type="submit">Enviar</button>

    </form>

  </section>
</main>

</body>
</html>
