<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
</head>
<body>

<header>
  <h1>Registro de usuario</h1>
</header>

<main>
  <section>
    <h2>Información académica</h2>

    <form>

      <label for="lenguaje">Lenguaje favorito:</label><br>
      <input list="lenguajes" id="lenguaje" name="lenguaje" placeholder="Ej. JavaScript">

      <datalist id="lenguajes">
        <option value="JavaScript">
        <option value="Python">
        <option value="Java">
        <option value="C++">
        <option value="Go">
      </datalist>

      <br><br>

      <label for="pais">País:</label><br>
      <input list="paises" id="pais" name="pais">

      <datalist id="paises">
        <option value="México">
        <option value="España">
        <option value="Argentina">
        <option value="Colombia">
      </datalist>

      <br><br>

      <button type="submit">Enviar</button>

    </form>
  </section>
</main>

<footer>
  <p>Formulario educativo</p>
</footer>

</body>
</html>
