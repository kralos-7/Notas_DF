<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro avanzado</title>
</head>
<body>

<header>
  <h1>Crear cuenta</h1>
</header>

<main>
  <section>

    <form>

      <label for="nombre">Nombre completo:</label><br>
      <input type="text" id="nombre" name="nombre" required minlength="5"><br><br>

      <label for="correo">Correo electrónico:</label><br>
      <input type="email" id="correo" name="correo" required><br><br>

      <label for="password">Contraseña:</label><br>
      <input type="password" id="password" name="password"
             required minlength="8"
             pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}">
      <small>Debe tener al menos 8 caracteres, una mayúscula y un número</small><br><br>

      <label for="edad">Edad:</label><br>
      <input type="number" id="edad" name="edad" min="18" max="100" required><br><br>

      <label for="telefono">Teléfono:</label><br>
      <input type="tel" id="telefono" name="telefono"
             pattern="[0-9]{10}" placeholder="10 dígitos"><br><br>

      <button type="submit">Registrarse</button>

    </form>

  </section>
</main>

<footer>
  <p>Formulario educativo</p>
</footer>

</body>
</html>
