<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Moderno con CSS3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Laboratorio de Layout Moderno</h1>
        <p>Modifica el CSS para ver cómo reaccionan los elementos.</p>
    </header>

    <section>
        <h2>1. Flexbox (Eje X o Eje Y)</h2>
        <div class="flex-container">
            <div class="box">Item 1</div>
            <div class="box">Item 2 - Más largo</div>
            <div class="box">Item 3</div>
        </div>
    </section>

    <section>
        <h2>2. CSS Grid (Tabla Bidimensional)</h2>
        <div class="grid-container">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box grid-item-especial">4 (Especial)</div>
            <div class="box">5</div>
            <div class="box">6</div>
        </div>
    </section>

</body>
</html>
