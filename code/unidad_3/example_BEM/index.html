<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticias BEM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <h1 class="header__title">Mi Portal de Noticias</h1>
  </header>

  <!-- NAV -->
  <nav class="nav">
    <ul class="nav__list">
      <li class="nav__item"><a href="#" class="nav__link">Inicio</a></li>
      <li class="nav__item"><a href="#" class="nav__link">Tecnología</a></li>
      <li class="nav__item"><a href="#" class="nav__link">Deportes</a></li>
    </ul>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <!-- CONTENEDOR DE NOTICIAS -->
    <section class="news">

      <!-- TARJETA -->
      <article class="card card--featured">
        <img src="https://via.placeholder.com/400" class="card__image" alt="imagen">
        <h2 class="card__title">Noticia destacada</h2>
        <p class="card__text">Contenido de la noticia destacada.</p>
        <button class="card__button">Leer más</button>
      </article>

      <article class="card">
        <img src="https://via.placeholder.com/400" class="card__image" alt="imagen">
        <h2 class="card__title">Noticia 2</h2>
        <p class="card__text">Contenido de la noticia.</p>
        <button class="card__button">Leer más</button>
      </article>

      <article class="card">
        <img src="https://via.placeholder.com/400" class="card__image" alt="imagen">
        <h2 class="card__title">Noticia 3</h2>
        <p class="card__text">Contenido de la noticia.</p>
        <button class="card__button">Leer más</button>
      </article>

    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p class="footer__text">© 2026 Noticias BEM</p>
  </footer>

</body>
</html>
